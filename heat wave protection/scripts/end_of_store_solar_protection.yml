alias: Fin de protection solaire volet
fields:
  volet:
    description: Entité du volet
    example: cover.sonoff_mini_zbrbs_4
  helper:
    description: Helper indiquant que la protection solaire est active
    example: input_boolean.protection_solaire_grande_baie_active
sequence:
  - target:
      entity_id: "{{ volet }}"
    action: cover.open_cover
  - wait_template: |
      {{ is_state(volet, 'open') }}
    timeout: "00:02:00"
    continue_on_timeout: true
  - delay: "00:00:03"
  - target:
      entity_id: "{{ helper }}"
    action: input_boolean.turn_off
description: ""
