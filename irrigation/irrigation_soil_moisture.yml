alias: Fruit Trees - Digital Twin - soil moisture
description: ""
triggers:
  - minutes: /10
    trigger: time_pattern
actions:
  - if:
      - condition: state
        entity_id: input_boolean.fruit_trees_debug
        state: "on"
    then:
      - action: persistent_notification.create
        data:
          title: 🌳 Fruit Trees - DEBUG Soil Model
          message: >
            INPUTS: - Soil saturation: {{ soil_saturation }} % - Temperature: {{
            air_temperature }} °C - Humidity: {{ relative_humidity }} % - Wind:
            {{ wind_speed }} m/s - UV: {{ uv_index }} - Rain: {{
            states(entity_rain)|float(0) }} mm/h - Valve: {{
            states(entity_valve) }}

            CALCULATIONS: - ET0: {{ et0 }} - Stress factor: {{ stress_factor }}
            - Crop ET: {{ crop_et }}

            - Fast water loss: {{ fast_water_loss }} - Slow water loss: {{
            slow_water_loss }} - Total water loss: {{ water_loss }}

            - Rain gain: {{ rain_gain }}

            - Drainage loss: {{ drainage_loss }}

            RESULT: - New soil saturation: {{ new_soil_saturation }} %
  - target:
      entity_id: input_number.watering_fruit_trees_soil_saturation
    data:
      value: "{{ new_soil_saturation }}"
    action: input_number.set_value
mode: single
variables:
  model_time_step_minutes: 10
  dt: "{{ model_time_step_minutes / 1440 }}"
  entity_soil_saturation: input_number.watering_fruit_trees_soil_saturation
  location: paris
  entity_temp: "{{ 'sensor.' ~ location ~ '_temperature' }}"
  entity_humidity: "{{ 'sensor.' ~ location ~ '_humidity' }}"
  entity_wind: "{{ 'sensor.' ~ location ~ '_wind_speed' }}"
  entity_uv: "{{ 'sensor.' ~ location ~ '_uv' }}"
  entity_rain: sensor.openweathermap_rain_intensity
  entity_valve: switch.electrovanne_state
  # Number of trees represented by this model, unitless.
  tree_count: 8
  # Horizontal surface area covered by one tree's root zone, in square meters (m2).
  # Multiply by tree_count to get the total modeled root zone area.
  individual_root_zone_area: 2
  # Total horizontal surface area of the modeled root zone, in square meters (m2).
  root_zone_area: "{{ (tree_count | float(0)) * (individual_root_zone_area | float(0)) }}"
  # Modeled depth of the root zone, in meters (m).
  # This is the average effective rooting depth used by the model.
  root_zone_depth: 0.625
  root_zone_volume: "{{ (root_zone_area | float(0)) * (root_zone_depth | float(0)) }}"
  # Usable water storage density of the root zone, expressed in L/m3.
  #
  # This is the soil-type parameter: how many liters of plant-available water
  # one cubic meter of soil can hold before drainage dominates.
  #
  # To estimate the total capacity used by the model:
  #   water_capacity (L) = root_zone_volume (m3) * usable_water_storage (L/m3)
  #
  # If you have a real soil test, use that value first. Otherwise, use the
  # soil texture as a starting point:
  #
  # - sand: 100 to 130 L/m3
  # - loam: 140 to 170 L/m3
  # - clay: 180 to 220 L/m3
  #
  # Current setting follows a clay-like soil behavior.
  usable_water_storage: 190
  water_capacity: "{{ (root_zone_volume | float(0)) * (usable_water_storage | float(0)) }}"
  crop_coefficient: 0.85
  irrigation_flow_rate: 475
  rain_efficiency: 0.75
  irrigation_efficiency: 0.95
  soil_saturation: |
    {{ states(entity_soil_saturation)|float(100) }}
  air_temperature: |
    {{ states(entity_temp)|float(20) }}
  relative_humidity: |
    {{ states(entity_humidity)|float(60) }}
  wind_speed: |
    {{ states(entity_wind)|float(2) }}
  uv_index: |
    {{ states(entity_uv)|float(0) }}
  solar_radiation: |
    {{ states(entity_uv)|float(0) * 10 }}
  et0: |
    {{
      (0.0023 * (air_temperature + 17.8) * solar_radiation)
      + (0.2 * wind_speed)
      - (0.02 * (100 - relative_humidity))
    }}
  stress_factor: |
    {% if soil_saturation > 70 %}
      1
    {% else %}
      {{ soil_saturation / 70 }}
    {% endif %}
  minimal_et: 0.6
  crop_et: |
    {{ [et0 * crop_coefficient * stress_factor, minimal_et] | max }}
  fast_water_loss: |
    {{ crop_et * 0.7 * root_zone_area * dt }}
  slow_water_loss: |
    {{ crop_et * 0.3 * root_zone_area * dt * 0.4 }}
  water_loss: |
    {{ fast_water_loss + slow_water_loss }}
  drainage_loss: |
    {% if soil_saturation > 90 %}
      {{ (soil_saturation - 90) ** 1.3 * 0.2 }}
    {% else %}
      0
    {% endif %}
  rain_gain: |
    {{
      states(entity_rain)|float(0)
      * root_zone_area
      * (model_time_step_minutes / 60)
      * rain_efficiency
    }}
  current_water: |
    {{ (soil_saturation / 100) * (water_capacity | float(0)) }}
  new_soil_saturation: >
    {% set w =
      (current_water | float(0))
      - (water_loss | float(0))
      + (rain_gain | float(0))
    %}

    {% set raw = (w / (water_capacity | float(0))) * 100 - drainage_loss %}
    {#
      Soil texture drainage coefficient.
      Current setting: clay soil.
      Examples:
      - clay: 0.35
      - loam: 0.20
      - sand: 0.08
      Higher values mean slower drainage and more water retained.
    #}
    {% set k = 0.35 %}
    {% if raw > 100 %}
      {% set corrected = 100 + (raw - 100) * (1 - k) %}
    {% elif raw < 0 %}
      {% set corrected = raw * (1 - k) %}
    {% else %}
      {% set corrected = raw %}
    {% endif %}

    {{ [0, [corrected, 100] | min] | max }}
